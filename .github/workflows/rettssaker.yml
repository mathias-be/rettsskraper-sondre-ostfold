name: Rettssaker overvåker

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python domstol_overvaker.py

      - name: Commit cache
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add cache.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "update cache" && git push)
